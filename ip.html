<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DNS Resolver</title>

  <!-- Remix Icon CDN -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border-radius: 16px;
      padding: 30px 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      text-align: center;
      width: 320px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
      opacity: 0.8;
    }

    .ip-box {
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      padding: 15px;
      font-size: 18px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .copy-btn {
      background: #38bdf8;
      border: none;
      color: white;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: 0.2s;
    }

    .copy-btn:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }

    .status {
      margin-top: 15px;
      font-size: 13px;
      opacity: 0.7;
    }

    .loading {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Resolved IP Address</h1>

    <div class="ip-box">
      <span id="ip" class="loading">Loading...</span>
      <button class="copy-btn" onclick="copyIP()">
        <i class="ri-file-copy-line"></i>
      </button>
    </div>

    <div id="status" class="status">Fetching DNS record...</div>
  </div>

  <script>
    let currentIP = "";

    async function fetchIP() {
      try {
        const res = await fetch("https://dns.google/resolve?name=w1ndows9.twilightparadox.com");
        const data = await res.json();

        const answer = data.Answer?.find(a => a.type === 1);

        if (answer) {
          currentIP = answer.data;
          document.getElementById("ip").textContent = currentIP;
          document.getElementById("ip").classList.remove("loading");
          document.getElementById("status").textContent = "Successfully resolved";
        } else {
          throw new Error("No A record found");
        }
      } catch (err) {
        document.getElementById("ip").textContent = "Error";
        document.getElementById("ip").classList.remove("loading");
        document.getElementById("status").textContent = err.message;
      }
    }

    function copyIP() {
      if (!currentIP) return;

      navigator.clipboard.writeText(currentIP).then(() => {
        const status = document.getElementById("status");
        status.textContent = "Copied to clipboard!";
        setTimeout(() => {
          status.textContent = "Successfully resolved";
        }, 1500);
      });
    }

    fetchIP();
  </script>

</body>
</html>
