<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNS Resolver</title>

  <!-- Remix Icon -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 20%, #0f172a, #020617 80%);
      overflow: hidden;
      color: white;
    }

    /* animated gradient blobs */
    .bg-blur {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #38bdf8, transparent 70%);
      filter: blur(120px);
      animation: float 10s infinite alternate ease-in-out;
    }

    .bg-blur.pink {
      background: radial-gradient(circle, #a78bfa, transparent 70%);
      top: 60%;
      left: 60%;
      animation-delay: 3s;
    }

    @keyframes float {
      from { transform: translate(0,0); }
      to { transform: translate(80px, -60px); }
    }

    .card {
      position: relative;
      z-index: 2;
      width: 360px;
      padding: 30px;
      border-radius: 18px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 60px rgba(56,189,248,0.15);
    }

    .title {
      font-size: 14px;
      opacity: 0.6;
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .ip-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      padding: 14px;
      margin-top: 10px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    #ip {
      font-size: 18px;
      letter-spacing: 1px;
    }

    .copy-btn {
      background: linear-gradient(135deg, #38bdf8, #6366f1);
      border: none;
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      color: white;
      display: flex;
      align-items: center;
      transition: all 0.2s ease;
    }

    .copy-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(99,102,241,0.6);
    }

    .status {
      margin-top: 12px;
      font-size: 12px;
      opacity: 0.6;
    }

    .loading {
      background: linear-gradient(90deg, #555, #999, #555);
      background-size: 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200%; }
      100% { background-position: -200%; }
    }

    .glow {
      position: absolute;
      inset: 0;
      border-radius: 18px;
      pointer-events: none;
      box-shadow: 0 0 40px rgba(56,189,248,0.25);
    }
  </style>
</head>
<body>

  <div class="bg-blur"></div>
  <div class="bg-blur pink"></div>

  <div class="card">
    <div class="glow"></div>

    <div class="title">DNS Resolve Result</div>

    <div class="ip-container">
      <span id="ip" class="loading">resolving...</span>
      <button class="copy-btn" onclick="copyIP()">
        <i class="ri-file-copy-line"></i>
      </button>
    </div>

    <div id="status" class="status">querying google dns...</div>
  </div>

  <script>
    let currentIP = "";

    async function fetchIP() {
      try {
        const res = await fetch("https://dns.google/resolve?name=w1ndows9.twilightparadox.com");
        const data = await res.json();

        const record = data.Answer?.find(r => r.type === 1);

        if (!record) throw new Error("no A record");

        currentIP = record.data;

        document.getElementById("ip").textContent = currentIP;
        document.getElementById("ip").classList.remove("loading");
        document.getElementById("status").textContent = "resolved successfully";
      } catch (e) {
        document.getElementById("ip").textContent = "failed";
        document.getElementById("ip").classList.remove("loading");
        document.getElementById("status").textContent = e.message;
      }
    }

    function copyIP() {
      if (!currentIP) return;

      navigator.clipboard.writeText(currentIP);

      const status = document.getElementById("status");
      status.textContent = "copied to clipboard ✓";

      setTimeout(() => {
        status.textContent = "resolved successfully";
      }, 1500);
    }

    fetchIP();
  </script>

</body>
</html>
